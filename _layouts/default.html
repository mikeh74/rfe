<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}">
  <link rel="icon" href="{{ "/assets/images/favicon.svg" | relative_url }}" type="image/svg+xml">

  {% if page.banner_image %}
    <style>
      .banner {
        --banner-image: url('{{ page.banner_image | relative_url }}');
      }
    </style>
  {% endif %}

</head>
<body>
  <main class="page">
    <div class="container">

      {% include header.html %}
      {% if page.banner_title or page.banner_tagline or page.banner_image %}
        {% include banner.html %}
      {% endif %}
      {{ content }}
    </div>
  </main>
  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
