<header class="site-header">
  {% capture nav_links %}
    <a href="{{ "/posts/" | relative_url }}" {% if page.url == "/posts/" %}aria-current="page"{% endif %}>Posts</a>
    <a href="{{ "/search/" | relative_url }}" {% if page.url == "/search/" %}aria-current="page"{% endif %}>Search</a>
    <a href="{{ "/about/" | relative_url }}" {% if page.url == "/about/" %}aria-current="page"{% endif %}>About</a>
    <a href="{{ "/contact/" | relative_url }}" {% if page.url == "/contact/" %}aria-current="page"{% endif %}>Contact</a>
  {% endcapture %}

  <div class="site-header-inner container">
    <div class="site-nav">
      <a class="brand" href="{{ "/" | relative_url }}">
        <!-- <img src="{{ site.logo | relative_url }}" alt="{{ site.title }}" class="logo"> -->
        <span>{{ site.title }}</span>
      </a>

      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="mobile-nav-panel" aria-label="Open menu" data-menu-toggle>
        <span class="menu-toggle-icon" aria-hidden="true"></span>
        <span>Menu</span>
      </button>

      <nav class="primary-nav" aria-label="Primary navigation">
        {{ nav_links }}
      </nav>
    </div>
  </div>

  <div class="mobile-nav-overlay" data-mobile-overlay></div>

  <nav id="mobile-nav-panel" class="mobile-nav-panel" aria-label="Mobile navigation" aria-hidden="true" data-mobile-panel>
    <div class="mobile-nav-header">
      <span class="mobile-nav-title">Navigate</span>
      <button class="mobile-nav-close" type="button" aria-label="Close menu" data-menu-close>Close</button>
    </div>
    <div class="mobile-nav-links">
      {{ nav_links }}
    </div>
  </nav>
</header>
